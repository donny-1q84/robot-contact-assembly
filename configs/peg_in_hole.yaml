task:
  name: peg_in_hole
  robot: isaac_arm_tbd
  workspace:
    frame: world
    table_height_m: 0.75
  objects:
    peg:
      shape: cylinder
      radius_m: 0.01
      length_m: 0.08
    socket:
      hole_radius_m: 0.0105
      insertion_depth_m: 0.03

control:
  mode: ee_delta_pose
  action_rate_hz: 20
  clamp:
    pos_m: 0.01
    rot_rad: 0.1

observations:
  proprio:
    joint_positions: true
    joint_velocities: true
    ee_pose: true
  task:
    peg_pose: true
    socket_pose: true
    relative_pose: true
  vision:
    enabled: false

rewards:
  reach_weight: 1.0
  align_weight: 2.0
  insert_weight: 5.0
  success_bonus: 20.0
  action_penalty: 0.01
  collision_penalty: 0.5

termination:
  timeout_s: 10.0
  unstable_contact_threshold: 1.0
